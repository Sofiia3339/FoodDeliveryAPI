<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страви - FoodDelivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/site.css" />
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg custom-navbar mb-4 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <div class="logo-icon"><i class="bi bi-egg-fried"></i></div>
                <span>Адмін: Страви</span>
            </a>
            <div class="d-flex gap-3">
                <a href="index.html" class="btn btn-outline-secondary btn-sm">Категорії</a>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">Вийти</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4">
            
            <div class="col-lg-4 col-xl-3">
                <div class="modern-card">
                    <div class="card-header-custom">
                        <h6 class="mb-0 fw-bold" id="form-title"><i class="bi bi-plus-circle me-2"></i>Додати страву</h6>
                    </div>
                    <div class="card-body-custom">
                        <form action="javascript:void(0);" onsubmit="saveDish()">
                            <input type="hidden" id="dish-id" value="0">
                            
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">КАТЕГОРІЯ</label>
                                <select id="dish-category" class="form-select custom-input" required></select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">НАЗВА СТРАВИ</label>
                                <input type="text" class="form-control custom-input" id="dish-name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-semibold">ОПИС</label>
                                <textarea class="form-control custom-input" id="dish-desc" rows="2" required></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-semibold">ПОТОЧНА ЦІНА (₴)</label>
                                <input type="number" step="0.01" class="form-control custom-input" id="dish-price" required>
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-light w-50" id="btn-cancel" style="display:none;" onclick="resetForm()">Скасувати</button>
                                <button type="submit" class="btn btn-primary-custom w-100" id="btn-submit">Зберегти страву</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8 col-xl-9">
                <div class="modern-card">
                    <div class="table-responsive">
                        <table class="table custom-table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th width="20%" class="ps-4">Категорія</th>
                                    <th width="25%">Назва</th>
                                    <th width="25%">Опис</th>
                                    <th width="15%">Ціна</th>
                                    <th width="15%" class="text-end pe-4">Дії</th>
                                </tr>
                            </thead>
                            <tbody id="dishes-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header text-white bg-success border-0" id="toastHeader">
                <strong class="me-auto" id="toastTitle">Сповіщення</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body bg-white" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dishes.js"></script>
</body>
</html>
