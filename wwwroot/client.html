<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню - FoodDelivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/site.css" />
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg custom-navbar mb-4 shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <div class="logo-icon"><i class="bi bi-shop"></i></div>
                <span>FoodDelivery</span>
            </a>
            <div class="d-flex gap-3 align-items-center">
                <button class="btn btn-outline-primary position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                    <i class="bi bi-cart3"></i> Кошик
                    <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                        0
                    </span>
                </button>
                <button onclick="logout()" class="btn btn-outline-secondary btn-sm">Вийти</button>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <h4 class="fw-bold mb-4">Наше меню</h4>
        <div class="row g-4" id="menu-container">
            <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="cartOffcanvasLabel"><i class="bi bi-cart-check me-2"></i>Ваше замовлення</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            
            <div id="cart-items" class="flex-grow-1 overflow-auto mb-3">
                <p class="text-muted text-center mt-4">Кошик порожній</p>
            </div>

            <div class="border-top pt-3" id="checkout-form-container" style="display: none;">
                <h5 class="d-flex justify-content-between fw-bold mb-3">
                    <span>Разом:</span>
                    <span id="cart-total" class="text-primary">0.00 ₴</span>
                </h5>
                <form action="javascript:void(0);" onsubmit="placeOrder()">
                    <div class="mb-2">
                        <label class="form-label small text-muted">АДРЕСА ДОСТАВКИ</label>
                        <input type="text" class="form-control custom-input" id="order-address" required placeholder="Вул. Хрещатик, 1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">КОМЕНТАР ДЛЯ КУХАРЯ</label>
                        <textarea class="form-control custom-input" id="order-comment" rows="2" placeholder="Наприклад: без цибулі"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 fs-5">Оформити замовлення</button>
                </form>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
