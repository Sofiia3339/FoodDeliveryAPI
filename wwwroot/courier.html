<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Кур'єра</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/site.css" />
</head>
<body class="bg-light">

    <nav class="navbar custom-navbar shadow-sm sticky-top">
        <div class="container-fluid px-3 d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold mb-0"><i class="bi bi-bicycle text-primary me-2"></i>Доставка</span>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Вийти</button>
        </div>
    </nav>

    <div class="container mt-3 mb-5 pb-5">
        
        <ul class="nav nav-pills nav-fill mb-4 bg-white rounded shadow-sm p-1" id="courierTabs">
            <li class="nav-item">
                <a class="nav-link active" id="available-tab" data-bs-toggle="pill" href="#available" onclick="loadAvailableOrders()">Вільні</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="my-tab" data-bs-toggle="pill" href="#my-orders" onclick="loadMyOrders()">В роботі</a>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="available">
                <div id="available-list" class="d-flex flex-column gap-3">
                    <div class="text-center py-5 text-muted">Шукаємо нові замовлення...</div>
                </div>
            </div>

            <div class="tab-pane fade" id="my-orders">
                <div id="my-list" class="d-flex flex-column gap-3"></div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/courier.js"></script>
</body>
</html>
