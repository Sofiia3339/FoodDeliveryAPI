<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/site.css" />
    <style>
        body { background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .nav-pills .nav-link.active { background-color: #6366f1; }
        .nav-link { color: #64748b; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h4 class="text-center fw-bold mb-4">🍕 FoodDelivery</h4>
        
        <ul class="nav nav-pills nav-fill mb-4" id="authTab" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" id="login-tab" data-bs-toggle="pill" href="#login" role="tab">Вхід</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="register-tab" data-bs-toggle="pill" href="#register" role="tab">Реєстрація</a>
            </li>
        </ul>

        <div class="tab-content" id="authTabContent">
            <div class="tab-pane fade show active" id="login" role="tabpanel">
                <form action="javascript:void(0);" onsubmit="loginUser()">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Електронна пошта</label>
                        <input type="email" id="login-email" class="form-control custom-input" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted">Пароль</label>
                        <input type="password" id="login-password" class="form-control custom-input" required>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100">Увійти</button>
                </form>
            </div>

            <div class="tab-pane fade" id="register" role="tabpanel">
                <form action="javascript:void(0);" onsubmit="registerUser()">
                    <div class="mb-2">
                        <input type="text" id="reg-name" class="form-control custom-input" placeholder="ПІБ" required>
                    </div>
                    <div class="mb-2">
                        <input type="tel" id="reg-phone" class="form-control custom-input" placeholder="Телефон" required>
                    </div>
                    <div class="mb-2">
                        <input type="email" id="reg-email" class="form-control custom-input" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="reg-password" class="form-control custom-input" placeholder="Пароль" required>
                    </div>
                    <div class="mb-3">
                        <select id="reg-role" class="form-control custom-input">
                            <option value="Client">Я Клієнт</option>
                            <option value="Courier">Я Кур'єр</option>
                            <option value="Admin">Я Адміністратор</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100">Зареєструватися</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
